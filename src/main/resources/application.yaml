
app:
  oauth2:
    registration:
      name: app
  # Konfiguration fuer PasswordDecryptionService:
  # attribute-name : Name des UserInfo-Claims mit ECIES-verschluesseltem PW
  #                  (wird ueber den Client-Scope 'sonia-secret' geliefert).
  # private-key    : PKCS8-EC-Privatekey (Base64) zur ECIES-Entschluesselung.
  password:
    attribute-name: "ENCRYPTED_USER_PASSWORD"
    private-key: "*** unset ***"
  homepage-enabled: false

spring:
  application:
    name: redirector
  profiles:
    active: default
  banner:
    location: classpath:banner.txt
  config:
    import: optional:file:config.yaml
  messages:
    basename: messages
    encoding: UTF-8
  security:
    oauth2:
      client:
        registration:
          app:
            client-id: redirector
            client-secret: "*** not set ***"
            # 'sonia-secret' liefert das ENCRYPTED_USER_PASSWORD-Attribut im
            # UserInfo-Endpoint - ersetzt den frueheren Admin-API-Lookup.
            # 'email' ist zugleich Ausloeser fuer den UserInfo-Abruf (Spring
            # holt UserInfo nur bei Ueberschneidung mit {profile,email,...}).
            scope: openid,profile,email,roles,sonia-secret
        provider:
          app:
            issuer-uri: https://id.dev.sonia.de/realms/dev
            jwks-uri: https://id.dev.sonia.de/realms/dev/protocol/openid-connect/certs
            user-name-attribute: preferred_username
            
#  ssl:
