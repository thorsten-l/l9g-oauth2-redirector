#          key:
#            alias: "server"
#            password: "*** unset ***"
#          keystore:
#            location: "file:server.p12"
#            password: "*** unset ***"
#            type: "PKCS12"

logging:
  pattern:
    console: "%date{yyyy-MM-dd HH:mm:ss} %magenta([%thread]) %highlight(%-5level) %logger:%line - %yellow(%msg %n)"
  level:
    root: INFO

server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 4m
#  ssl:
#    bundle: "web-server"

management:
  server:
    port: 9091
  endpoints:
    web:
      exposure:
        include: info,health,metrics
